        <script>
            (() => {
                const legacyHosts = new Set([
                    'fbxh-all-in-one.org',
                    'xh-all-in-one.org',
                    'fb-aio.github.io',
                    'fbaio.org'
                ]);
                const currentOrigin = window.location.origin;
                const normalizeLegacyUrl = value => {
                    if (typeof value !== 'string') return value;
                    try {
                        const url = new URL(value, currentOrigin);
                        if (legacyHosts.has(url.hostname)) {
                            return `${currentOrigin}${url.pathname}${url.search}${url.hash}`;
                        }
                    } catch {
                        return value;
                    }
                    return value;
                };
                const originalAssign = window.location.assign.bind(window.location);
                const originalReplace = window.location.replace.bind(window.location);
                window.location.assign = value => originalAssign(normalizeLegacyUrl(value));
                window.location.replace = value => originalReplace(normalizeLegacyUrl(value));
                window.addEventListener(
                    'beforeunload',
                    event => {
                        const nextUrl = normalizeLegacyUrl(document.activeElement?.href || '');
                        if (nextUrl && nextUrl !== document.activeElement?.href) {
                            event.preventDefault();
                            window.location.href = nextUrl;
                        }
                    },
                    { capture: true }
                );
            })();
        </script>

                    const uuid = Math.random().toString(36).slice(2);
                    const eventName = `aio-contentscript-sendto-pagescript${uuid}`;
                    let timer = null;
                    const done = info => {
                        if (timer) window.clearTimeout(timer);
                        window.removeEventListener(eventName, onResponse);
                        window.__XH_EXTENSION_PINGING = null;
                        if (info) window.setXHExtensionReady(info);
                        resolve(info);
                    };
                    const onResponse = event => done(event?.detail?.data || window.XH_EXTENSION_STATE);

                    window.addEventListener(eventName, onResponse, { once: true });
                    timer = window.setTimeout(() => done(null), timeout);
                    try {
                        window.dispatchEvent(
                            new CustomEvent('aio-pagescript-sendto-contentscript', {
                                detail: {
                                    uuid,
                                    event: 'aio-runInBackground',
                                    data: {
                                        fnPath: 'browserApi.runtime.getManifest',
                                        params: []
                                    }
                                }
                            })
                        );
                    } catch (error) {
                        done(null);
                    }
                });

                return window.__XH_EXTENSION_PINGING;
            };

            window.applyXHModuleCleanup = function applyXHModuleCleanup() {
                const removedPatterns = window.XH_REMOVED_PATTERNS;
                const removedPaths = window.XH_REMOVED_PATHS;
                const normalizeText = value =>
                    String(value || '')
                        .normalize('NFD')
                        .replace(/[\u0300-\u036f]/g, '')
                        .replace(/đ/g, 'd')
                        .replace(/Đ/g, 'D')
                        .replace(/\s+/g, ' ')
                        .trim()
                        .toLowerCase();
                const getPathFromHref = href => {
                    if (!href) return false;
                    let path = href;
                    try {
                        const url = new URL(href, window.location.origin);
                        const hashPath = url.hash.replace(/^#/, '').split('?')[0];
                        path = hashPath.startsWith('/') ? hashPath : url.pathname;
                    } catch (error) {}
                    if (String(path).includes('#/')) {
                        path = String(path).slice(String(path).indexOf('#/') + 1).split('?')[0];
                    }
                    return String(path).split('?')[0] || '/';
                };
                const shouldRemovePath = path =>
                    typeof path === 'string' &&
                    removedPaths.some(removedPath => path === removedPath || path.startsWith(`${removedPath}/`));
                const shouldRemoveText = text => {
                    const normalized = normalizeText(text);
                    if (!normalized) return false;
                    if (window.XH_REMOVED_LABELS.has(normalized)) return true;
                    for (const label of window.XH_REMOVED_LABELS) {
                        if (normalized.startsWith(`${label} `)) return true;
                    }
                    return removedPatterns.some(pattern => pattern.test(text || '') || pattern.test(normalized));
                };
                const isSettingsText = text => window.XH_SETTINGS_LABELS.has(normalizeText(text));
                const closestMenuNode = element =>
                    element.closest(
                        'li, .ant-menu-item, .ant-menu-submenu, .ant-menu-submenu-title, .ant-dropdown-menu-item, [role="menuitem"], [class*="menu-item"], [class*="submenu"]'
                    );
                const isTableSurface = element =>
                    Boolean(
                        element?.closest(
                            '.ant-table, .ant-table-wrapper, .ant-table-title, .ant-table-container, .ant-table-content, .ant-table-thead, .ant-table-tbody'
                        )
                    );
                const isNavigationSurface = element =>
                    Boolean(
                        element?.closest(
                            'aside, nav, .ant-layout-sider, .ant-menu, .ant-dropdown-menu, [role="navigation"], [data-menu-id]'
                        )
                    );
                const hideElement = element => {
                    if (!element) return;
                    element.classList.add('xh-hidden-module');
                    element.setAttribute('aria-hidden', 'true');
                    element.setAttribute('data-xh-removed', 'true');
                    element.remove();
                };

                document.querySelectorAll('[title], [aria-label], [data-menu-id]').forEach(element => {
                    const label = [element.getAttribute('title'), element.getAttribute('aria-label'), element.textContent]
                        .filter(Boolean)
                        .join(' ');
                    if (!shouldRemoveText(label)) return;
                    const menuNode = closestMenuNode(element);
                    if (menuNode) {
                        hideElement(menuNode);
                        return;
                    }
                    if (isTableSurface(element)) return;
                    if (isNavigationSurface(element)) hideElement(element);
                });

                document.querySelectorAll('a[href]').forEach(anchor => {
                    const text = anchor.textContent || '';
                    const path = getPathFromHref(anchor.getAttribute('href'));
                    const menuNode = closestMenuNode(anchor);
                    const isHelpSettings =
                        shouldRemoveText(menuNode?.textContent) &&
                        isSettingsText(text);
                    if (!isHelpSettings && (shouldRemovePath(path) || shouldRemoveText(text))) {
                        if (menuNode) {
                            hideElement(menuNode);
                            return;
                        }
                        if (isTableSurface(anchor)) return;
                        if (isNavigationSurface(anchor) || shouldRemovePath(path)) {
                            hideElement(anchor.closest('.ant-card, section, article') || anchor);
                        }
                    }
                    if (isHelpSettings) {
                        anchor.setAttribute('href', '#/settings');
                    }
                });

                document.querySelectorAll('li, .ant-menu-item, .ant-menu-submenu, .ant-card, section, article, [role="menuitem"]').forEach(
                    element => {
                        const text = (element.textContent || '').replace(/\s+/g, ' ').trim();
                        const normalized = normalizeText(text);
                        if (window.XH_HELP_LABELS.has(normalized)) {
                            element.querySelectorAll('a[href]').forEach(anchor => {
                                if (shouldRemovePath(getPathFromHref(anchor.getAttribute('href')))) {
                                    hideElement(closestMenuNode(anchor) || anchor);
                                }
                            });
                            return;
                        }
                        if (isTableSurface(element)) return;
                        if (shouldRemoveText(text)) hideElement(element);
                    }
                );

                const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
                const textNodes = [];
                while (walker.nextNode()) textNodes.push(walker.currentNode);
                textNodes.forEach(node => {
                    const text = (node.nodeValue || '').replace(/\s+/g, ' ').trim();
                    if (/FB\s*xH|Ra mắt xH/i.test(text)) {
                        node.parentElement?.closest('div, span, header')?.classList.add('xh-hidden-announcement');

                    if (!shouldRemoveText(text)) return;
                    if (isTableSurface(node.parentElement)) return;
                    const section = node.parentElement?.closest('section, .ant-card, .ant-row, .ant-list, article');
                    if (section) hideElement(section);
                });

                const hashPath = window.location.hash.replace(/^#/, '').split('?')[0] || '/';
                const browserPath = window.location.pathname;
                const activePath = browserPath === '/' ? hashPath : browserPath;

                }

                }

                main.classList.add('xh-dashboard-clean');

                const existing = document.querySelector('.xh-dashboard-shell');
                if (existing) return;

                const hero = document.createElement('div');
                hero.className = 'xh-dashboard-shell';
                hero.innerHTML = `
                    <section class="xh-dashboard-hero" aria-label="xH all in one dashboard">
                        <img class="xh-dashboard-logo" src="${window.XH_BRAND.logo}" alt="${window.XH_BRAND.name} logo" />
                        <div>
                            <h1 class="xh-dashboard-title">${window.XH_BRAND.name}</h1>
                            <p class="xh-dashboard-copy">
                                Bộ công cụ Facebook downloader, dọn dữ liệu và quản lý nội dung. Tài khoản đang ở trạng thái VIP, toàn bộ quyền đã được mở.
                            </p>
                            <div class="xh-dashboard-actions">
                                <a class="xh-dashboard-action primary" href="#/bulk-downloader"><i class="fa-solid fa-arrows-down-to-line"></i>Bulk Downloader</a>
                                <a class="xh-dashboard-action" href="#/activities"><i class="fa-solid fa-broom"></i>Clean Facebook</a>
                                <a class="xh-dashboard-action" href="${window.XH_BRAND.facebook}" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-facebook"></i>Hỗ trợ</a>
                            </div>
                        </div>
                    </section>
                    <footer style="color: var(--xh-muted); text-align: center; padding: 8px 0 24px; font-size: 13px;">
                        ${window.XH_BRAND.name} ©2026 - Created by ${window.XH_BRAND.author} - ${window.XH_BRAND.phone} - fb.com/nxh1811
                    </footer>
                `;
                main.prepend(hero);
            };

            window.applyXHChrome = function applyXHChrome() {
                document.querySelectorAll('img').forEach(image => {
                    const src = image.getAttribute('src') || '';
                    const alt = image.getAttribute('alt') || '';
                    const parentText = image.parentElement?.textContent || '';
                    const isUserAvatar =
                        /scontent|fbcdn|profile|avatar|picture/i.test(src + ' ' + alt) ||
                        image.closest('.ant-avatar, [class*="avatar"], [class*="profile"], [aria-label*="account" i], header');
                    const isBrandSlot =
                        image.classList.contains('xh-dashboard-logo') ||
                        /logo|xh all in one|fb aio extension|fb aio/i.test(src + ' ' + alt + ' ' + parentText) ||
                        (image.closest('aside, nav') && image.getBoundingClientRect().width <= 96);
                    if (isBrandSlot && !isUserAvatar && !/chrome|firefox|edge/i.test(src + ' ' + alt)) {
                        image.setAttribute('src', window.XH_BRAND.logo);
                        image.setAttribute('alt', `${window.XH_BRAND.name} logo`);
                    }
                });

                if (!document.querySelector('.xh-vip-pill')) {
                    const pill = document.createElement('div');
                    pill.className = 'xh-vip-pill';
                    pill.innerHTML = '<i class="fa-solid fa-crown"></i> VIP active - full quyền';
                    document.body.appendChild(pill);
                }
            };

            window.applyXHUX = function applyXHUX() {
                window.applyXHAccess();
                window.applyXHExtensionState();
                window.applyXHBranding();
                window.applyXHModuleCleanup();
                window.applyXHTheme();
                window.applyXHChrome();
                window.applyXHDashboard();
                window.removeXHInstallPrompts();
            };

            window.installXHBranding = function installXHBranding() {
                window.installXHRouteGuard();
                window.applyXHUX();
                new MutationObserver(() => window.applyXHUX()).observe(document.body, {
                    childList: true,
                    subtree: true,
                    characterData: true
                });
                window.addEventListener('hashchange', window.applyXHUX);
                window.addEventListener('popstate', window.applyXHUX);
                const brandingTimer = setInterval(window.applyXHUX, 500);
                setTimeout(() => clearInterval(brandingTimer), 10000);
            };

            if (document.body) {
                window.installXHBranding();
            } else {
                document.addEventListener('DOMContentLoaded', window.installXHBranding, { once: true });
            }

            // Backup dashboard URLs
            window.XH_ALL_IN_ONE_BACKUP_URLS = [
                // Add backup URLs here when available
            ];

            // Populate backup URLs list
            const backupUrlsList = document.getElementById('backupUrlsList');
            if (backupUrlsList) {
                const curDomain = window.location.hostname;
                window.XH_ALL_IN_ONE_BACKUP_URLS.forEach(({ url, label, divider }) => {
                    // ignore same domain
                    // if (new URL(url)?.hostname === curDomain) return;
                    if (divider) {
                        const hr = document.createElement('hr');
                        backupUrlsList.appendChild(hr);
                        return;
                    }

                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = url + window.location.hash;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.innerHTML = `<i class="fa-solid fa-external-link"></i>${label}`;
                    li.appendChild(a);
                    backupUrlsList.appendChild(li);
                });
            }

            // Show recovery container after 1 second if loading screen is still visible
            setTimeout(() => {
                const loadingEle = document.querySelector('._init_loading');
                const recoveryContainer = document.getElementById('recoveryContainer');

                if (loadingEle && recoveryContainer) {
                    recoveryContainer.style.display = 'block';
                }
            }, 2000);

            // Hard refresh logic (same as HardRefresh.tsx)
            document.getElementById('hardRefreshBtn')?.addEventListener('click', async () => {
                const btn = document.getElementById('hardRefreshBtn');
                if (!btn) return;

                try {
                    // Disable button and show loading state
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Clearing cache...';

                    // Clear all caches
                    await caches.keys().then(keys => keys.forEach(k => caches.delete(k)));

                    // Update button text
                    btn.innerHTML =
                        '<i class="fa-solid fa-spinner fa-spin"></i> Unregistering service worker...';

                    // Unregister all service workers
                    await navigator.serviceWorker
                        .getRegistrations()
                        .then(r => r.forEach(x => x.unregister()));

                    // Update button text
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Reloading...';

                    // Wait a moment then reload
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    window.location.reload();
                } catch (error) {
                    console.error('Hard refresh failed:', error);
                    btn.disabled = false;
                    btn.innerHTML =
                        '<i class="fa-solid fa-rotate"></i> Hard Refresh (Failed - Try Again)';
                    btn.style.backgroundColor = '#ff4d4f';
                }
            });
        </script>

    </body>
</html>
